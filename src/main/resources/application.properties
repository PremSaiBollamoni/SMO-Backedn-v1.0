spring.application.name=smo
server.port=8080
server.address=0.0.0.0
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/smo?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:PremSai}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Flyway Database Migration - DISABLED (Hibernate handles schema auto-creation)
spring.flyway.enabled=false

# Override in env for production: SMO_DATA_KEY
app.security.aes-key=${SMO_DATA_KEY:SMO_DEFAULT_32_CHAR_SECRET_KEY_!}

# Service Discovery Configuration
smo.service.name=SMO-Backend
smo.service.version=1.0.0
app.base-url=http://localhost

# Comprehensive Logging Configuration
logging.level.root=INFO
logging.level.com.cutm.smo=DEBUG
logging.level.com.cutm.smo.controller=DEBUG
logging.level.com.cutm.smo.services=DEBUG
logging.level.com.cutm.smo.services.ProcessPlanService=DEBUG
logging.level.com.cutm.smo.repository=DEBUG
logging.level.com.cutm.smo.repositories=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.boot.web.servlet.ServletWebServerApplicationContext=DEBUG
logging.level.org.hibernate=WARN
logging.level.com.zaxxer.hikari=WARN

# Log HTTP requests and responses
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestResponseBodyMethodProcessor=DEBUG
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=DEBUG

# Enable SQL logging to see all database operations
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE