spring.application.name=palms
server.port=8080
server.address=0.0.0.0
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/PALMSV1?createDatabaseIfNotExist=true&useSSL=true&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:PremSai}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Flyway disabled - Hibernate handles schema auto-creation
spring.flyway.enabled=false

# Logging
logging.level.root=INFO
logging.level.com.cutm.smo=DEBUG
logging.level.org.hibernate=WARN
logging.level.com.zaxxer.hikari=WARN
logging.level.org.hibernate.SQL=WARN

# Springdoc OpenAPI (Swagger)
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.use-root-path=true
springdoc.show-login-endpoint=true
springdoc.show-actuator=false

# Gemini AI Configuration (set GEMINI_API_KEY environment variable)
gemini.api.key=${GEMINI_API_KEY:}

# Encryption Configuration
encryption.key=4a6GXFK5AKZVakj9dKF5tnlWoijE6mlIZ8c5DrXNj2w=
encryption.enabled=true

# JWT Configuration
jwt.secret=${JWT_SECRET:your-secret-key-change-this-in-production-environment-with-at-least-256-bits-of-entropy-minimum-32-characters}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# CORS Configuration
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://yourdomain.com,http://localhost:4200}
app.cors.max-age=${CORS_MAX_AGE:3600}

# Security Configuration
app.swagger.enabled=${SWAGGER_ENABLED:true}
app.security.enable-https-only=${ENABLE_HTTPS_ONLY:false}